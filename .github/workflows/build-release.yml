name: Build & Release

on:
  push:
    branches: [main]
    paths:
      - 'main.py'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Lire la version
        id: version
        shell: python
        run: |
          import re, os
          with open("main.py", encoding="utf-8") as f:
              content = f.read()
          m = re.search(r'VERSION\s*=\s*"([\d.]+)"', content)
          ver = m.group(1) if m else "0.0.0"
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"ver={ver}\n")

      - name: Vérifier si la release existe déjà
        id: check
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if gh release view "v${{ steps.version.outputs.ver }}" --repo paolito13/CoursSW > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Installer les dépendances
        if: steps.check.outputs.exists == 'false'
        run: |
          pip install pyinstaller requests mss Pillow pywin32 winsdk pystray psutil --quiet

      - name: Build PyInstaller
        if: steps.check.outputs.exists == 'false'
        run: |
          python -m PyInstaller --onedir --windowed `
            --name "CourSW" `
            --hidden-import "requests" `
            --hidden-import "mss" `
            --hidden-import "PIL" `
            --hidden-import "PIL.Image" `
            --hidden-import "win32gui" `
            --hidden-import "win32con" `
            --hidden-import "win32process" `
            --hidden-import "winsdk" `
            --hidden-import "winsdk.windows.media.ocr" `
            --hidden-import "winsdk.windows.graphics.imaging" `
            --hidden-import "winsdk.windows.storage.streams" `
            --hidden-import "asyncio" `
            --collect-all "winsdk" `
            --hidden-import "pystray" `
            --collect-all "pystray" `
            --hidden-import "psutil" `
            main.py

      - name: Créer le ZIP
        if: steps.check.outputs.exists == 'false'
        run: |
          Compress-Archive -Path "dist\CourSW" -DestinationPath "dist\CourSW.zip"

      - name: Créer la release GitHub
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh release create "v${{ steps.version.outputs.ver }}" `
            "dist\CourSW.zip" `
            --repo paolito13/CoursSW `
            --title "CourSW v${{ steps.version.outputs.ver }}" `
            --notes "Build automatique depuis GitHub Actions"

      # Publie la version sur le site SANS commit -> aucun rebuild Vercel (le lien pointe sur la
      # release GitHub "latest", statique ; seul le label de version est servi a l'execution).
      - name: Publier la version sur Almanach-PEH (sans rebuild)
        if: steps.check.outputs.exists == 'false'
        shell: bash
        run: |
          curl -fsS -X POST "https://almanach-peh.vercel.app/api/cours/version" \
            -H "x-admin-key: ${{ secrets.ALMANACH_VERSION_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"version\":\"${{ steps.version.outputs.ver }}\"}"
