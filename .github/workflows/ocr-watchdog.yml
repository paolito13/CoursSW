name: OCR Watchdog

on:
  schedule:
    - cron: '23 */4 * * *'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout CoursSW
        uses: actions/checkout@v4
        with:
          repository: paolito13/CoursSW
          token: ${{ secrets.GH_PAT }}
          path: CoursSW

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Analyse OCR et création d'issues
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: python CoursSW/scripts/ocr_watchdog.py

      - name: Commit IDs analysés
        working-directory: CoursSW
        run: |
          git config user.name "OCR Watchdog"
          git config user.email "ocr-watchdog@almanach-peh"
          git add .ocr_analyzed_ids.txt
          git diff --cached --quiet || git commit -m "chore : IDs OCR analysés mis à jour"
          git push https://paolito13:${{ secrets.GH_PAT }}@github.com/paolito13/CoursSW.git HEAD:main
