name: OCR Watchdog

on:
  schedule:
    - cron: '23 */4 * * *'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout CoursSW
        uses: actions/checkout@v4
        with:
          repository: paolito13/CoursSW
          token: ${{ secrets.GH_PAT }}
          path: CoursSW

      - name: Checkout Almanach-PEH
        uses: actions/checkout@v4
        with:
          repository: paolito13/Almanach-PEH
          token: ${{ secrets.GH_PAT }}
          path: Almanach-PEH

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Analyse OCR et correction main.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python CoursSW/scripts/ocr_watchdog.py

      - name: Commit et push CoursSW
        if: hashFiles('fix_info.txt') != ''
        working-directory: CoursSW
        run: |
          NEW_VER=$(head -1 ../fix_info.txt)
          FIXES=$(tail -1 ../fix_info.txt)
          git config user.name "OCR Watchdog"
          git config user.email "ocr-watchdog@almanach-peh"
          git add main.py .ocr_analyzed_ids.txt
          git diff --cached --quiet || git commit -m "fix : correction OCR automatique — $FIXES"
          git push https://paolito13:${{ secrets.GH_PAT }}@github.com/paolito13/CoursSW.git HEAD:main

      - name: Mise à jour Almanach-PEH
        if: hashFiles('fix_info.txt') != ''
        run: python CoursSW/scripts/update_almanach.py

      - name: Commit et push Almanach-PEH
        if: hashFiles('fix_info.txt') != ''
        working-directory: Almanach-PEH
        run: |
          NEW_VER=$(head -1 ../fix_info.txt)
          git config user.name "OCR Watchdog"
          git config user.email "ocr-watchdog@almanach-peh"
          git add -A
          git diff --cached --quiet || git commit -m "chore : bump COURS_REQUIRED_VERSION=$NEW_VER + patchnote OCR auto"
          git push https://paolito13:${{ secrets.GH_PAT }}@github.com/paolito13/Almanach-PEH.git HEAD:main
